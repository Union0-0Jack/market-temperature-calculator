<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股市计数温度计算器</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    const CURRENT_DATA_SCHEMA_VERSION = 3;
    const STORAGE_KEYS = {
      // 历史 key 必须保持稳定，离线 HTML 覆盖更新后才能继续读到旧数据。
      history: 'market-temperature-history-v1',
      autoSave: 'market-temperature-auto-save-v1',
      timeZone: 'market-temperature-time-zone-v1',
      showChartValues: 'market-temperature-show-chart-values-v1',
      showSpxTrend: 'market-temperature-show-spx-trend-v1',
      schemaVersion: 'market-temperature-schema-version-v1',
      migrationBackup: 'market-temperature-history-backup-before-v3-v1',
    };
    const TEMPERATURE_UNIT = '°';
    const SPX_SYMBOL = '^GSPC';
    const SPX_DATA_SOURCE = 'Financial Modeling Prep';
    const SPX_MARKET_TIME_ZONE = 'America/New_York';
    const DEFAULT_SPX_API_KEY = 'Fxo3FUzkCWYSCgOUTdh1JiLgRwtWfg0s';
    const INPUT_MODES = {
      counts: 'counts',
      manual: 'manual',
    };
    const TIME_ZONE_OPTIONS = [
      { key: 'America/New_York', label: '美东时间' },
      { key: 'Asia/Shanghai', label: '北京时间' },
    ];
    const safeNumber = (value) => {
      const parsed = parseFloat(value);
      return Number.isFinite(parsed) ? parsed : 0;
    };

    const getValidTimeZone = (value) =>
      TIME_ZONE_OPTIONS.some((option) => option.key === value) ? value : TIME_ZONE_OPTIONS[0].key;

    const getTimeZoneParts = (timestamp, timeZone) => {
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hourCycle: 'h23',
      });
      const parts = formatter.formatToParts(new Date(timestamp));
      const values = {};
      parts.forEach((part) => {
        if (part.type !== 'literal') values[part.type] = part.value;
      });
      return {
        year: Number(values.year),
        month: Number(values.month),
        day: Number(values.day),
        hour: Number(values.hour === '24' ? '0' : values.hour),
        minute: Number(values.minute),
        second: Number(values.second),
      };
    };

    const getTimeZoneOffsetMs = (timestamp, timeZone) => {
      const parts = getTimeZoneParts(timestamp, timeZone);
      const utcTimestamp = Date.UTC(
        parts.year,
        parts.month - 1,
        parts.day,
        parts.hour,
        parts.minute,
        parts.second
      );
      return utcTimestamp - timestamp;
    };

    const parseDateTimeInTimeZone = (value, timeZone) => {
      if (!value) return NaN;
      const [datePart, timePart = '00:00'] = value.split('T');
      const [year, month, day] = datePart.split('-').map(Number);
      const [hour = 0, minute = 0] = timePart.split(':').map(Number);
      if (![year, month, day, hour, minute].every(Number.isFinite)) return NaN;

      const utcGuess = Date.UTC(year, month - 1, day, hour, minute);
      const firstPass = utcGuess - getTimeZoneOffsetMs(utcGuess, timeZone);
      return utcGuess - getTimeZoneOffsetMs(firstPass, timeZone);
    };

    const formatRecordDate = (timestamp, timeZone = TIME_ZONE_OPTIONS[0].key) =>
      new Date(timestamp).toLocaleString('zh-CN', {
        timeZone,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
      });

    const formatChartDate = (timestamp, timeZone = TIME_ZONE_OPTIONS[0].key) =>
      new Date(timestamp).toLocaleDateString('zh-CN', {
        timeZone,
        month: 'numeric',
        day: 'numeric',
      });

    const formatTemperature = (value) => `${safeNumber(value).toFixed(2)}${TEMPERATURE_UNIT}`;
    const isManualRecord = (record) => record.inputMode === INPUT_MODES.manual;
    const hasSpxValue = (record) => Number.isFinite(Number(record.spxValue)) && Number(record.spxValue) > 0;
    const formatSpxValue = (value) => Number(value).toLocaleString('en-US', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });

    const formatChartTooltip = (record, timeZone) => {
      const rows = [
        `时间：${formatRecordDate(record.timestamp, timeZone)}`,
        `温度：${formatTemperature(record.temperature)}`,
      ];

      if (hasSpxValue(record)) {
        rows.push(`SPX：${formatSpxValue(record.spxValue)}`);
      }

      if (isManualRecord(record)) {
        rows.push('来源：手动输入温度');
      } else {
        rows.push(
          `上涨：${record.upCount}`,
          `下跌：${record.downCount}`,
          `平盘：${record.flatCount}`,
          `总家数：${record.totalCount}`
        );
      }

      return rows.join('\n');
    };

    const RANGE_OPTIONS = [
      { key: '5', label: '近5日', days: 5 },
      { key: '20', label: '近20日', days: 20 },
      { key: '60', label: '近60日', days: 60 },
      { key: 'all', label: '全部', days: Infinity },
    ];

    const formatDateTimeLocalValue = (timestamp, timeZone = TIME_ZONE_OPTIONS[0].key) => {
      const date = getTimeZoneParts(timestamp, timeZone);
      const year = date.year;
      const month = String(date.month).padStart(2, '0');
      const day = String(date.day).padStart(2, '0');
      const hours = String(date.hour).padStart(2, '0');
      const minutes = String(date.minute).padStart(2, '0');
      return `${year}-${month}-${day}T${hours}:${minutes}`;
    };

    const formatFileDate = (date = new Date()) =>
      [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, '0'),
        String(date.getDate()).padStart(2, '0'),
      ].join('-');

    const DAY_MS = 24 * 60 * 60 * 1000;

    const formatDateInputValue = (date) =>
      [
        date.getUTCFullYear(),
        String(date.getUTCMonth() + 1).padStart(2, '0'),
        String(date.getUTCDate()).padStart(2, '0'),
      ].join('-');

    const formatRecordDateFilterValue = (timestamp, timeZone) => {
      const parts = getTimeZoneParts(timestamp, timeZone);
      return [
        parts.year,
        String(parts.month).padStart(2, '0'),
        String(parts.day).padStart(2, '0'),
      ].join('-');
    };

    const shiftDateInputValue = (dateValue, dayOffset) => {
      const [year, month, day] = dateValue.split('-').map(Number);
      const date = new Date(Date.UTC(year, month - 1, day) + dayOffset * DAY_MS);
      return formatDateInputValue(date);
    };

    const parseSpxRows = (payload) => {
      if (payload && (payload['Error Message'] || payload['Note'] || payload.error)) {
        throw new Error(payload['Error Message'] || payload['Note'] || payload.error || 'SPX 数据源返回错误。');
      }

      const rawRows = Array.isArray(payload && payload.historical)
        ? payload.historical
        : (Array.isArray(payload) ? payload : []);

      return rawRows
        .map((row) => ({
          date: row.date,
          close: Number(row.close),
        }))
        .filter((row) => /^\d{4}-\d{2}-\d{2}$/.test(row.date) && Number.isFinite(row.close) && row.close > 0)
        .sort((a, b) => a.date.localeCompare(b.date));
    };

    const fetchSpxRowsForDateRange = async (startDate, endDate, apiKey) => {
      if (!apiKey || !apiKey.trim()) {
        throw new Error('内置 SPX API Key 缺失，无法刷新 SPX。');
      }
      const url = `https://financialmodelingprep.com/stable/historical-price-eod/full?symbol=${encodeURIComponent(SPX_SYMBOL)}&from=${startDate}&to=${endDate}&apikey=${encodeURIComponent(apiKey.trim())}`;

      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`SPX 数据请求失败：HTTP ${response.status}`);
      }

      const payload = await response.json();
      const rows = parseSpxRows(payload);
      if (!rows.length) {
        throw new Error('未找到可用的 SPX 收盘数据。');
      }

      return rows;
    };

    const pickSpxCloseForMarketDate = (rows, targetMarketDate) => {
      const matchedRows = rows.filter((row) => row.date <= targetMarketDate);
      const selectedRow = matchedRows[matchedRows.length - 1] || rows[0];
      return {
        value: Number(selectedRow.close.toFixed(2)),
        marketDate: selectedRow.date,
        source: SPX_DATA_SOURCE,
      };
    };

    const fetchSpxCloseForTimestamp = async (timestamp, apiKey) => {
      if (!Number.isFinite(Number(timestamp))) {
        throw new Error('缺少有效日期，无法匹配 SPX。');
      }

      const targetMarketDate = formatRecordDateFilterValue(timestamp, SPX_MARKET_TIME_ZONE);
      const startDate = shiftDateInputValue(targetMarketDate, -7);
      const endDate = shiftDateInputValue(targetMarketDate, 2);
      const rows = await fetchSpxRowsForDateRange(startDate, endDate, apiKey);
      return pickSpxCloseForMarketDate(rows, targetMarketDate);
    };

    const getRangeStartTimestamp = (latestTimestamp, days, timeZone) => {
      if (days === Infinity) return -Infinity;

      const latestParts = getTimeZoneParts(latestTimestamp, timeZone);
      const latestDateUtc = Date.UTC(latestParts.year, latestParts.month - 1, latestParts.day);
      const startDate = new Date(latestDateUtc - (days - 1) * DAY_MS);
      return parseDateTimeInTimeZone(`${formatDateInputValue(startDate)}T00:00`, timeZone);
    };

    const getLatestRecordTimestamp = (records) =>
      records.reduce(
        (latest, record) => Math.max(latest, Number(record.timestamp)),
        records.length ? Number(records[0].timestamp) : 0
      );

    const filterRecordsByRange = (records, rangeOption, timeZone) => {
      if (!records.length || rangeOption.days === Infinity) return records;

      const latestTimestamp = getLatestRecordTimestamp(records);
      const startTimestamp = getRangeStartTimestamp(latestTimestamp, rangeOption.days, timeZone);
      if (!Number.isFinite(startTimestamp)) return records;

      return records.filter((record) => record.timestamp >= startTimestamp);
    };

    const getRecordSignature = (record) =>
      [
        record.inputMode || INPUT_MODES.counts,
        record.inputMode === INPUT_MODES.manual ? Number(record.timestamp).toFixed(0) : '',
        safeNumber(record.upCount).toFixed(4),
        safeNumber(record.downCount).toFixed(4),
        safeNumber(record.flatCount).toFixed(4),
        safeNumber(record.temperature).toFixed(4),
        hasSpxValue(record) ? Number(record.spxValue).toFixed(4) : '',
      ].join('|');

    const normalizeStoredRecord = (record) => {
      if (!record || typeof record !== 'object') return null;

      const timestamp = Number(record.timestamp);
      const upCount = safeNumber(record.upCount);
      const downCount = safeNumber(record.downCount);
      const flatCount = safeNumber(record.flatCount);
      const totalCount = safeNumber(record.totalCount) || upCount + downCount + flatCount;
      const temperature = safeNumber(record.temperature);
      const rawSpxValue = Number(record.spxValue);
      const spxValue = Number.isFinite(rawSpxValue) && rawSpxValue > 0
        ? Number(rawSpxValue.toFixed(2))
        : null;
      const inputMode = record.inputMode === INPUT_MODES.manual || totalCount <= 0
        ? INPUT_MODES.manual
        : INPUT_MODES.counts;

      if (!Number.isFinite(timestamp) || temperature < 0 || temperature > 100) return null;
      if (inputMode === INPUT_MODES.counts && totalCount <= 0) return null;

      return {
        id: record.id || String(timestamp),
        timestamp,
        inputMode,
        dateLabel: record.dateLabel || formatRecordDate(timestamp),
        upCount,
        downCount,
        flatCount,
        totalCount,
        temperature,
        spxValue,
      };
    };

    const normalizeHistoryRecords = (records) => {
      if (!Array.isArray(records)) return [];

      return records
        .map(normalizeStoredRecord)
        .filter(Boolean)
        .sort((a, b) => b.timestamp - a.timestamp);
    };

    const migrateStoredHistory = () => {
      const raw = window.localStorage.getItem(STORAGE_KEYS.history);
      if (!raw) {
        window.localStorage.setItem(STORAGE_KEYS.schemaVersion, String(CURRENT_DATA_SCHEMA_VERSION));
        return [];
      }

      const parsed = JSON.parse(raw);
      const normalizedRecords = normalizeHistoryRecords(parsed);
      const storedVersion = Number(window.localStorage.getItem(STORAGE_KEYS.schemaVersion)) || 1;
      const normalizedJson = JSON.stringify(normalizedRecords);

      if (storedVersion < CURRENT_DATA_SCHEMA_VERSION || raw !== normalizedJson) {
        if (!window.localStorage.getItem(STORAGE_KEYS.migrationBackup)) {
          window.localStorage.setItem(STORAGE_KEYS.migrationBackup, raw);
        }
        window.localStorage.setItem(STORAGE_KEYS.history, normalizedJson);
        window.localStorage.setItem(STORAGE_KEYS.schemaVersion, String(CURRENT_DATA_SCHEMA_VERSION));
      }

      return normalizedRecords;
    };

    const loadHistoryRecords = () => {
      try {
        return migrateStoredHistory();
      } catch (error) {
        return [];
      }
    };

    const loadAutoSavePreference = () => {
      try {
        return window.localStorage.getItem(STORAGE_KEYS.autoSave) === 'true';
      } catch (error) {
        return false;
      }
    };

    const loadTimeZonePreference = () => {
      try {
        return getValidTimeZone(window.localStorage.getItem(STORAGE_KEYS.timeZone));
      } catch (error) {
        return TIME_ZONE_OPTIONS[0].key;
      }
    };

    const loadShowChartValuesPreference = () => {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEYS.showChartValues);
        return raw === null ? true : raw === 'true';
      } catch (error) {
        return true;
      }
    };

    const loadShowSpxTrendPreference = () => {
      try {
        return window.localStorage.getItem(STORAGE_KEYS.showSpxTrend) === 'true';
      } catch (error) {
        return false;
      }
    };

    const escapeCsvValue = (value) => {
      const text = String(value);
      if (text.includes('"') || text.includes(',') || text.includes('\n')) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    };

    const downloadTextFile = (content, filename, mimeType) => {
      const blob = new Blob([content], { type: mimeType });
      const url = window.URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      window.setTimeout(() => window.URL.revokeObjectURL(url), 0);
    };

    // 定义所需图标 (SVG 格式)
    const ActivityIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    );
    const TrendingUpIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    );
    const TrendingDownIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>
    );
    const MinusIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/></svg>
    );
    const PlusIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    );
    const RotateCcwIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path></svg>
    );
    const ThermometerIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
    );
    const SaveIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
    );
    const DownloadIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    );
    const TrashIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
    );
    const HistoryIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v5h5"></path><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path><path d="M12 7v5l4 2"></path></svg>
    );
    const ChartIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"></path><path d="M7 14l4-4 3 3 5-7"></path></svg>
    );
    const EditIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
    );
    const XIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
    );
    const CheckSquareIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="m9 12 2 2 4-4"></path></svg>
    );
    const ExpandIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M8 21H5a2 2 0 0 1-2-2v-3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
    );
    const TargetIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="5"></circle><path d="M12 3v4"></path><path d="M12 17v4"></path><path d="M3 12h4"></path><path d="M17 12h4"></path></svg>
    );
    const CandlestickIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 3v18"></path><rect x="4" y="7" width="4" height="8" rx="1"></rect><path d="M12 3v18"></path><rect x="10" y="5" width="4" height="12" rx="1"></rect><path d="M18 3v18"></path><rect x="16" y="9" width="4" height="7" rx="1"></rect></svg>
    );

    const StatCard = ({ label, value, accentClass }) => (
      <div className="rounded-xl border border-slate-200 bg-slate-50 p-4">
        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">{label}</div>
        <div className={`mt-2 text-2xl font-black ${accentClass}`}>{value}</div>
      </div>
    );

    const getTemperatureTextClass = (value) => {
      if (value === null || value === undefined) return 'text-slate-900';
      if (value > 60) return 'text-red-600';
      if (value < 20) return 'text-green-600';
      return 'text-slate-950';
    };

    function PriceTargetCalculator() {
      const [mode, setMode] = useState('rise');
      const [pointA, setPointA] = useState('');
      const [pointB, setPointB] = useState('');
      const [result, setResult] = useState(null);
      const isRiseMode = mode === 'rise';
      const handlePriceInputFocus = (event) => event.target.select();
      const modeConfig = isRiseMode
        ? {
            title: '上涨测回调',
            subtitle: 'A 为起点低点，B 为阶段高点，计算回调目标位。',
            labelA: 'A点价格（起点/低点）',
            labelB: 'B点价格（高点）',
            formula: '0.749A + 0.251B',
            weighted: (a, b) => 0.749 * a + 0.251 * b,
          }
        : {
            title: '下跌测反弹',

    function HistoryChart({
      records,
      rangeLabel,
      timeZone,
      showValues,
      showSpxTrend,
      isFullscreen = false,
      onExpand,
      onClose,
      rangeOptions = [],
      activeRangeKey = '',
      onRangeChange,
    }) {
      const chartRecords = records.slice().sort((a, b) => a.timestamp - b.timestamp);
      const maxRecordIndex = Math.max(chartRecords.length - 1, 0);
      const getFullViewWindow = () => ({ start: 0, end: maxRecordIndex });
      const [activePointId, setActivePointId] = useState(null);
      const [viewWindow, setViewWindow] = useState(getFullViewWindow);
      const interactionRef = useRef(null);
      const chartClipId = useRef(`history-chart-clip-${Math.random().toString(36).slice(2)}`).current;
      const firstRecordId = chartRecords[0] ? chartRecords[0].id : '';
      const lastRecordId = chartRecords[chartRecords.length - 1] ? chartRecords[chartRecords.length - 1].id : '';

      useEffect(() => {
        setViewWindow(getFullViewWindow());
        setActivePointId(null);
      }, [chartRecords.length, firstRecordId, lastRecordId, activeRangeKey]);

      if (!records.length) {
        return (
          <div className="rounded-2xl border border-dashed border-slate-200 bg-slate-50 px-4 py-10 text-center text-sm text-slate-500">
            目前还没有历史记录，先保存几笔数据后就能看到时间轴趋势。
          </div>
        );
      }

      const width = 760;
      const height = isFullscreen ? 360 : 260;
      const spxValues = chartRecords.filter(hasSpxValue).map((record) => Number(record.spxValue));
      const hasVisibleSpxValues = spxValues.length > 0;
      const shouldShowSpxTrend = showSpxTrend && hasVisibleSpxValues;
      const padding = { top: 20, right: 16, bottom: 42, left: 40 };
      const innerWidth = width - padding.left - padding.right;
      const innerHeight = height - padding.top - padding.bottom;
      const lowThreshold = 20;
      const highThreshold = 60;
      const temperatures = chartRecords.map((record) => record.temperature);
      const minTemperature = Math.min(...temperatures);
      const maxTemperature = Math.max(...temperatures);
      const yMin = Math.max(0, Math.min(lowThreshold, Math.floor((minTemperature - 5) / 5) * 5));
      const yMax = Math.min(100, Math.max(highThreshold, Math.ceil((maxTemperature + 5) / 5) * 5));
      const ySpan = Math.max(1, yMax - yMin);
      const tickValues = [lowThreshold, highThreshold];
      const minSpxValue = hasVisibleSpxValues ? Math.min(...spxValues) : 0;
      const maxSpxValue = hasVisibleSpxValues ? Math.max(...spxValues) : 0;
      const spxPadding = Math.max(10, (maxSpxValue - minSpxValue) * 0.08);
      const spxMin = Math.max(0, minSpxValue - spxPadding);
      const spxMax = maxSpxValue + spxPadding;
      const spxSpan = spxMax - spxMin;
      const minVisibleSpan = Math.min(6, maxRecordIndex);

      const clampViewWindow = (nextWindow) => {
        if (maxRecordIndex <= 0) return { start: 0, end: 0 };

        let start = Number.isFinite(nextWindow.start) ? nextWindow.start : 0;
        let end = Number.isFinite(nextWindow.end) ? nextWindow.end : maxRecordIndex;
        if (end < start) [start, end] = [end, start];

        let span = end - start;
        if (span < minVisibleSpan) {
          const center = (start + end) / 2;
          start = center - minVisibleSpan / 2;
          end = center + minVisibleSpan / 2;
          span = minVisibleSpan;
        }

        if (span >= maxRecordIndex) return { start: 0, end: maxRecordIndex };

        if (start < 0) {
          end -= start;
          start = 0;
        }
        if (end > maxRecordIndex) {
          start -= end - maxRecordIndex;
          end = maxRecordIndex;
        }

        return {
          start: Math.max(0, start),
          end: Math.min(maxRecordIndex, end),
        };
      };

      const view = clampViewWindow(viewWindow);
      const viewSpan = Math.max(1, view.end - view.start);
      const isZoomed = maxRecordIndex > 0 && viewSpan < maxRecordIndex - 0.01;
      const canZoom = maxRecordIndex > minVisibleSpan;

      const getX = (index) => {
        if (chartRecords.length === 1 || maxRecordIndex <= 0) {
          return padding.left + innerWidth / 2;
        }
        return padding.left + ((index - view.start) / viewSpan) * innerWidth;
      };

      const getY = (value) => padding.top + innerHeight - ((value - yMin) / ySpan) * innerHeight;
      const getSpxY = (value) => {
        if (!shouldShowSpxTrend || spxSpan <= 0) return padding.top + innerHeight / 2;
        return padding.top + innerHeight - ((value - spxMin) / spxSpan) * innerHeight;
      };

      const getTemperatureTone = (value) => {
        if (value > highThreshold) {
          return {
            stroke: '#dc2626',
            fill: '#dc2626',
            text: 'fill-red-600',
            halo: 'rgba(220, 38, 38, 0.16)',
          };
        }
        if (value < lowThreshold) {
          return {
            stroke: '#16a34a',
            fill: '#16a34a',
            text: 'fill-green-600',
            halo: 'rgba(22, 163, 74, 0.16)',
          };
        }
        return {
          stroke: '#0f172a',
          fill: '#0f172a',
          text: 'fill-slate-950',
          halo: 'rgba(15, 23, 42, 0.12)',
        };
      };

      const points = chartRecords.map((record, index) => ({
        ...record,
        chartIndex: index,
        x: getX(index),
        y: getY(record.temperature),
        spxY: hasSpxValue(record) ? getSpxY(Number(record.spxValue)) : null,
      }));
      const visiblePoints = points.filter((point) => point.chartIndex >= view.start - 0.001 && point.chartIndex <= view.end + 0.001);

      const getDateLabelAnchor = (x) => {
        if (x < padding.left + 28) return 'start';
        if (x > width - padding.right - 28) return 'end';
        return 'middle';
      };

      const lineSegments = points.slice(1).map((point, index) => {
        const previousPoint = points[index];
        const segmentTone = getTemperatureTone(point.temperature);
        return {
          key: `${previousPoint.id}-${point.id}`,
          x1: previousPoint.x,
          y1: previousPoint.y,
          x2: point.x,
          y2: point.y,
          stroke: segmentTone.stroke,
        };
      }).filter((segment) => segment.x1 <= width - padding.right && segment.x2 >= padding.left);
      const spxPoints = points.filter(hasSpxValue);
      const spxLineSegments = shouldShowSpxTrend
        ? spxPoints.slice(1).map((point, index) => {
            const previousPoint = spxPoints[index];
            return {
              key: `spx-${previousPoint.id}-${point.id}`,
              x1: previousPoint.x,
              y1: previousPoint.spxY,
              x2: point.x,
              y2: point.spxY,
            };
          }).filter((segment) => segment.x1 <= width - padding.right && segment.x2 >= padding.left)
        : [];
      const visibleDateLabelIndexes = (() => {
        if (points.length <= 1) return new Set(points.map((_, index) => index));

        const firstVisibleIndex = Math.max(0, Math.ceil(view.start));
        const lastVisibleIndex = Math.min(maxRecordIndex, Math.floor(view.end));
        if (firstVisibleIndex > lastVisibleIndex) return new Set();

        const visibleCount = lastVisibleIndex - firstVisibleIndex + 1;
        const targetCount = Math.min(isFullscreen ? 8 : 6, visibleCount);
        if (targetCount <= 1) return new Set([firstVisibleIndex]);

        const indexes = new Set();
        const step = (lastVisibleIndex - firstVisibleIndex) / (targetCount - 1);
        for (let index = 0; index < targetCount; index += 1) {
          indexes.add(Math.round(firstVisibleIndex + step * index));
        }
        return indexes;
      })();
      const activePoint = points.find((point) => point.id === activePointId);
      const tooltipWidth = 170;
      const tooltipHeight = activePoint && hasSpxValue(activePoint) ? 78 : 62;
      const tooltipX = activePoint
        ? Math.min(
            Math.max(
              activePoint.x > width - padding.right - tooltipWidth - 12
                ? activePoint.x - tooltipWidth - 12
                : activePoint.x + 12,
              padding.left
            ),
            width - padding.right - tooltipWidth
          )
        : 0;
      const tooltipY = activePoint
        ? Math.min(
            Math.max(activePoint.y < padding.top + tooltipHeight ? activePoint.y + 18 : activePoint.y - tooltipHeight - 14, padding.top),
            height - padding.bottom - tooltipHeight
          )
        : 0;

      const getSvgXFromClient = (clientX, target) => {
        const rect = target.getBoundingClientRect();
        return ((clientX - rect.left) / rect.width) * width;
      };

      const getIndexFromSvgX = (svgX) => {
        const xRatio = (svgX - padding.left) / innerWidth;
        return view.start + xRatio * viewSpan;
      };

      const zoomView = (anchorIndex, scale) => {
        if (!canZoom) return;

        setViewWindow((currentWindow) => {
          const currentView = clampViewWindow(currentWindow);
          const currentSpan = Math.max(1, currentView.end - currentView.start);
          const nextSpan = currentSpan * scale;
          const anchorRatio = currentSpan > 0 ? (anchorIndex - currentView.start) / currentSpan : 0.5;
          const boundedAnchorRatio = Math.min(1, Math.max(0, anchorRatio));
          const nextStart = anchorIndex - nextSpan * boundedAnchorRatio;
          return clampViewWindow({ start: nextStart, end: nextStart + nextSpan });
        });
      };

      const panView = (indexDelta) => {
        if (!isZoomed || !Number.isFinite(indexDelta) || indexDelta === 0) return;

        setViewWindow((currentWindow) => {
          const currentView = clampViewWindow(currentWindow);
          return clampViewWindow({
            start: currentView.start + indexDelta,
            end: currentView.end + indexDelta,
          });
        });
      };

      const resetChartView = () => {
        setViewWindow(getFullViewWindow());
      };

      const setNearestPoint = (clientX, target) => {
        const svgX = getSvgXFromClient(clientX, target);
        const candidates = visiblePoints.length ? visiblePoints : points;
        const nearestPoint = candidates.reduce((nearest, point) =>
          Math.abs(point.x - svgX) < Math.abs(nearest.x - svgX) ? point : nearest
        );
        setActivePointId(nearestPoint.id);
      };

      const handleWheel = (event) => {
        if (!canZoom) return;

        const target = event.currentTarget;
        const isHorizontalScroll = Math.abs(event.deltaX) > 0 && Math.abs(event.deltaX) >= Math.abs(event.deltaY) * 0.7;

        if (isHorizontalScroll) {
          const panDelta = (event.deltaX / target.getBoundingClientRect().width) * viewSpan;
          panView(panDelta);
          return;
        }

        const svgX = Math.min(width - padding.right, Math.max(padding.left, getSvgXFromClient(event.clientX, target)));
        const anchorIndex = getIndexFromSvgX(svgX);
        zoomView(anchorIndex, event.deltaY > 0 ? 1.18 : 0.82);
      };

      const handlePointerDown = (event) => {
        if (event.pointerType === 'mouse' && event.button !== 0) return;

        interactionRef.current = {
          pointerId: event.pointerId,
          startClientX: event.clientX,
          startView: view,
          moved: false,
        };
        event.currentTarget.setPointerCapture && event.currentTarget.setPointerCapture(event.pointerId);
      };

      const handlePointerMove = (event) => {
        const svg = event.currentTarget.ownerSVGElement || event.currentTarget;
        const interaction = interactionRef.current;

        if (!interaction || interaction.pointerId !== event.pointerId) {
          setNearestPoint(event.clientX, svg);
          return;
        }

        const movement = event.clientX - interaction.startClientX;
        if (Math.abs(movement) > 2) interaction.moved = true;

        if (!interaction.moved) {
          setNearestPoint(event.clientX, svg);
          return;
        }

        if (isZoomed) {
          const svgDelta = (movement / svg.getBoundingClientRect().width) * width;
          const indexDelta = -(svgDelta / innerWidth) * (interaction.startView.end - interaction.startView.start);
          setViewWindow(clampViewWindow({
            start: interaction.startView.start + indexDelta,
            end: interaction.startView.end + indexDelta,
          }));
          setNearestPoint(event.clientX, svg);
          return;
        }
      };

      const handlePointerUp = (event) => {
        const svg = event.currentTarget.ownerSVGElement || event.currentTarget;
        event.currentTarget.releasePointerCapture && event.currentTarget.releasePointerCapture(event.pointerId);
        setNearestPoint(event.clientX, svg);
        interactionRef.current = null;
      };

      const handlePointerLeave = (event) => {
        if (!interactionRef.current) {
          setActivePointId(null);
        }
      };

      return (
        <div className={`${isFullscreen ? 'h-full' : ''} rounded-2xl border border-slate-200 bg-white p-4 shadow-sm`}>
          <div className="mb-4 flex items-start justify-between gap-4">
            <div>
              <h3 className="text-base font-bold text-slate-800">区间趋势</h3>
              <p className="mt-1 text-sm text-slate-500">当前展示 {rangeLabel} 的历史数据，滚轮或按钮缩放，放大后左右拖动查看。</p>
            </div>
            <div className="flex flex-wrap items-center justify-end gap-2">
              <div className="rounded-full bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700">
                共 {records.length} 条记录
              </div>
              <div className="inline-flex overflow-hidden rounded-lg border border-slate-200 bg-white">
                <button
                  type="button"
                  onClick={() => zoomView((view.start + view.end) / 2, 0.72)}
                  disabled={!canZoom}
                  title="放大"
                  aria-label="放大图表"
                  className="inline-flex h-8 w-8 items-center justify-center text-slate-600 transition hover:bg-slate-50 hover:text-slate-900 disabled:cursor-not-allowed disabled:text-slate-300"
                >
                  <PlusIcon size={14} />
                </button>
                <button
                  type="button"
                  onClick={() => zoomView((view.start + view.end) / 2, 1.38)}
                  disabled={!canZoom || !isZoomed}
                  title="缩小"
                  aria-label="缩小图表"
                  className="inline-flex h-8 w-8 items-center justify-center border-l border-slate-200 text-slate-600 transition hover:bg-slate-50 hover:text-slate-900 disabled:cursor-not-allowed disabled:text-slate-300"
                >
                  <MinusIcon size={14} />
                </button>
                <button
                  type="button"
                  onClick={resetChartView}
                  disabled={!isZoomed}
                  title="重置视图"
                  aria-label="重置图表视图"
                  className="inline-flex h-8 w-8 items-center justify-center border-l border-slate-200 text-slate-600 transition hover:bg-slate-50 hover:text-slate-900 disabled:cursor-not-allowed disabled:text-slate-300"
                >
                  <RotateCcwIcon size={14} />
                </button>
              </div>
              {isFullscreen ? (
                <button
                  type="button"
                  onClick={onClose}
                  className="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 transition hover:border-slate-300"
                >
                  <XIcon size={14} />
                  <span>退出全屏</span>
                </button>
              ) : (
                <button
                  type="button"
                  onClick={onExpand}
                  className="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 transition hover:border-blue-300 hover:text-blue-700"
                >
                  <ExpandIcon size={14} />
                  <span>放大全屏</span>
                </button>
              )}
            </div>
          </div>

          {isFullscreen && rangeOptions.length ? (
            <div className="mb-4 flex flex-wrap gap-2 border-b border-slate-100 pb-4">
              {rangeOptions.map((option) => (
                <button
                  key={option.key}
                  type="button"
                  onClick={() => onRangeChange && onRangeChange(option.key)}
                  className={`rounded-full px-4 py-2 text-sm font-semibold transition ${
                    activeRangeKey === option.key
                      ? 'bg-slate-900 text-white'
                      : 'border border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:text-slate-800'
                  }`}
                >
                  {option.label}
                </button>
              ))}
            </div>
          ) : null}

          {showSpxTrend ? (
            <div className="mb-3 flex flex-wrap items-center gap-3 text-xs font-semibold text-slate-500">
              <span className="inline-flex items-center gap-2 text-violet-700">
                <span className="h-0.5 w-6 rounded-full bg-violet-400"></span>
                SPX 背景趋势
              </span>
              <span>{shouldShowSpxTrend ? `当前区间 ${spxPoints.length} 条 SPX 点位` : '当前区间没有 SPX 点位'}</span>
            </div>
          ) : null}

          <div className="pb-2">
            <svg
              viewBox={`0 0 ${width} ${height}`}
              className={`${isFullscreen ? 'h-[70vh] min-h-[420px] w-full' : 'h-64 w-full'} select-none`}
              onWheel={handleWheel}
              onDoubleClick={resetChartView}
            >
              <defs>
                <clipPath id={chartClipId}>
                  <rect x={padding.left} y="0" width={innerWidth} height={height - padding.bottom + 8} />
                </clipPath>
              </defs>
              {tickValues.map((tick) => {
                const y = getY(tick);
                return (
                  <g key={tick}>
                    <line
                      x1={padding.left}
                      y1={y}
                      x2={width - padding.right}
                      y2={y}
                      stroke={tick === highThreshold ? '#dc2626' : '#16a34a'}
                      strokeDasharray="6 4"
                      strokeWidth="1.5"
                      opacity="0.72"
                    />
                    <text
                      x={padding.left - 10}
                      y={y + 4}
                      textAnchor="end"
                      className={`${tick === highThreshold ? 'fill-red-600' : 'fill-green-600'} text-[10px] font-semibold`}
                    >
                      {tick}{TEMPERATURE_UNIT}
                    </text>
                    <text
                      x={width - padding.right}
                      y={y - 6}
                      textAnchor="end"
                      className={`${tick === highThreshold ? 'fill-red-600' : 'fill-green-600'} text-[10px] font-semibold`}
                    >
                      {tick === highThreshold ? '偏热线' : '偏冷线'}
                    </text>
                  </g>
                );
              })}

              <g clipPath={`url(#${chartClipId})`}>
                {spxLineSegments.map((segment) => (
                  <line
                    key={segment.key}
                    x1={segment.x1}
                    y1={segment.y1}
                    x2={segment.x2}
                    y2={segment.y2}
                    stroke="#7c3aed"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeDasharray="8 6"
                    opacity="0.42"
                  />
                ))}

                {lineSegments.map((segment) => (
                  <line
                    key={segment.key}
                    x1={segment.x1}
                    y1={segment.y1}
                    x2={segment.x2}
                    y2={segment.y2}
                    stroke={segment.stroke}
                    strokeWidth="3"
                    strokeLinecap="round"
                  />
                ))}
              </g>

              <line
                x1={padding.left}
                y1={height - padding.bottom}
                x2={width - padding.right}
                y2={height - padding.bottom}
                stroke="#475569"
                strokeWidth="1.25"
              />

              <g clipPath={`url(#${chartClipId})`}>
              {points.map((point) => {
                const pointTone = getTemperatureTone(point.temperature);
                return (
                  <g key={point.id}>
                    <circle cx={point.x} cy={point.y} r={activePointId === point.id ? '13' : '10'} fill={activePointId === point.id ? 'rgba(15, 23, 42, 0.14)' : pointTone.halo} />
                    <circle cx={point.x} cy={point.y} r={activePointId === point.id ? '6' : '5'} fill={activePointId === point.id ? '#0f172a' : pointTone.fill} />
                    <title>{formatChartTooltip(point, timeZone)}</title>
                    {showValues ? (
                      <text x={point.x} y={point.y - 14} textAnchor="middle" className={`${pointTone.text} text-[10px] font-semibold`}>
                        {formatTemperature(point.temperature)}
                      </text>
                    ) : null}
                  </g>
                );
              })}
              </g>

              {points.map((point, index) => visibleDateLabelIndexes.has(index) ? (
                <g key={`date-${point.id}`}>
                  <line
                    x1={point.x}
                    y1={height - padding.bottom}
                    x2={point.x}
                    y2={height - padding.bottom + 5}
                    stroke="#64748b"
                    strokeWidth="1.25"
                  />
                  <text x={point.x} y={height - 12} textAnchor={getDateLabelAnchor(point.x)} className="fill-slate-700 text-[10px] font-semibold">
                    {formatChartDate(point.timestamp, timeZone)}
                  </text>
                </g>
              ) : null)}

              {activePoint ? (
                <g pointerEvents="none">
                  <line
                    x1={activePoint.x}
                    y1={padding.top}
                    x2={activePoint.x}
                    y2={height - padding.bottom}
                    stroke="#0f172a"
                    strokeWidth="1.5"
                    strokeDasharray="5 4"
                    opacity="0.65"
                  />
                  <circle cx={activePoint.x} cy={activePoint.y} r="7" fill="#0f172a" />
                  <circle cx={activePoint.x} cy={activePoint.y} r="14" fill="rgba(15, 23, 42, 0.16)" />
                  <g transform={`translate(${tooltipX} ${tooltipY})`}>
                    <rect width={tooltipWidth} height={tooltipHeight} rx="8" fill="#0f172a" opacity="0.94" />
                    <text x="12" y="18" className="fill-white text-[11px] font-semibold">
                      {formatRecordDate(activePoint.timestamp, timeZone)}
                    </text>
                    <text x="12" y="37" className="fill-blue-100 text-[13px] font-bold">
                      {formatTemperature(activePoint.temperature)}
                    </text>
                    {hasSpxValue(activePoint) ? (
                      <text x="12" y="54" className="fill-violet-100 text-[10px] font-semibold">
                        SPX {formatSpxValue(activePoint.spxValue)}
                      </text>
                    ) : null}
                    <text x="12" y={hasSpxValue(activePoint) ? '70' : '54'} className="fill-slate-300 text-[10px]">
                      {isManualRecord(activePoint) ? '手动温度' : `总家数 ${activePoint.totalCount.toFixed(0)}`}
                    </text>
                  </g>
                </g>
              ) : null}

              <rect
                x={padding.left}
                y={padding.top}
                width={innerWidth}
                height={innerHeight}
                fill="transparent"
                style={{ cursor: isZoomed ? 'grab' : 'crosshair', touchAction: 'none' }}
                onPointerDown={handlePointerDown}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
                onPointerCancel={handlePointerUp}
                onPointerLeave={handlePointerLeave}
              />
            </svg>
          </div>
        </div>
      );
    }

    function App() {
      const [activeToolTab, setActiveToolTab] = useState('temperature');
      const [inputMode, setInputMode] = useState(INPUT_MODES.counts);
      const [upCount, setUpCount] = useState('');
      const [downCount, setDownCount] = useState('');
      const [flatCount, setFlatCount] = useState('');
      const [manualTemperature, setManualTemperature] = useState('');
      const [spxValue, setSpxValue] = useState('');
      const [manualRecordTime, setManualRecordTime] = useState(() => formatDateTimeLocalValue(Date.now(), loadTimeZonePreference()));
      const [historyRecords, setHistoryRecords] = useState(loadHistoryRecords);
      const [autoSaveEnabled, setAutoSaveEnabled] = useState(loadAutoSavePreference);
      const [selectedTimeZone, setSelectedTimeZone] = useState(loadTimeZonePreference);
      const [showChartValues, setShowChartValues] = useState(loadShowChartValuesPreference);
      const [showSpxTrend, setShowSpxTrend] = useState(loadShowSpxTrendPreference);
      const spxApiKey = DEFAULT_SPX_API_KEY;
      const [feedback, setFeedback] = useState(null);
      const [statsRange, setStatsRange] = useState('20');
      const [editingRecordId, setEditingRecordId] = useState(null);
      const [bulkModeEnabled, setBulkModeEnabled] = useState(false);
      const [selectedRecordIds, setSelectedRecordIds] = useState([]);
      const [bulkEditingEnabled, setBulkEditingEnabled] = useState(false);
      const [dataMenuOpen, setDataMenuOpen] = useState(false);
      const [historyDateFilter, setHistoryDateFilter] = useState('');
      const [chartFullscreenOpen, setChartFullscreenOpen] = useState(false);
      const [spxRangeFetchLoading, setSpxRangeFetchLoading] = useState(false);
      const [editForm, setEditForm] = useState({
        timestamp: '',
        inputMode: INPUT_MODES.counts,
        upCount: '',
        downCount: '',
        flatCount: '',
        manualTemperature: '',
        spxValue: '',
      });
      const [bulkEditForms, setBulkEditForms] = useState({});

      const historyRef = useRef(historyRecords);
      const lastAutoSavedSignatureRef = useRef('');
      const jsonImportInputRef = useRef(null);

      const upValue = safeNumber(upCount);
      const downValue = safeNumber(downCount);
      const flatValue = safeNumber(flatCount);
      const manualTemperatureValue = safeNumber(manualTemperature);
      const spxInputValue = safeNumber(spxValue);
      const hasValidSpxInput = spxValue === '' || spxInputValue > 0;
      const isManualInputMode = inputMode === INPUT_MODES.manual;
      const manualRecordTimestamp = isManualInputMode
        ? parseDateTimeInTimeZone(manualRecordTime, selectedTimeZone)
        : Date.now();
      const totalCount = upValue + downValue + flatValue;
      const hasAnyInput = isManualInputMode
        ? manualTemperature !== ''
        : upCount !== '' || downCount !== '' || flatCount !== '';
      const hasValidTemperatureInput = isManualInputMode
        ? manualTemperature !== '' && manualTemperatureValue >= 0 && manualTemperatureValue <= 100 && Number.isFinite(manualRecordTimestamp)
        : totalCount > 0;
      const hasValidInput = hasValidTemperatureInput && hasValidSpxInput;
      const temperature = isManualInputMode
        ? (hasValidTemperatureInput ? manualTemperatureValue : 0)
        : (hasValidTemperatureInput ? (upValue / totalCount) * 100 : 0);
      const activeRangeOption = RANGE_OPTIONS.find((option) => option.key === statsRange) || RANGE_OPTIONS[1];
      const statsRecords = filterRecordsByRange(historyRecords, activeRangeOption, selectedTimeZone);
      const visibleHistoryRecords = historyDateFilter
        ? historyRecords.filter((record) => formatRecordDateFilterValue(record.timestamp, selectedTimeZone) === historyDateFilter)
        : historyRecords;
      const visibleRecordIds = visibleHistoryRecords.map((record) => record.id);
      const selectedVisibleCount = selectedRecordIds.filter((id) => visibleRecordIds.includes(id)).length;
      const allVisibleRecordsSelected = visibleRecordIds.length > 0 && selectedVisibleCount === visibleRecordIds.length;
      const selectedCount = selectedRecordIds.length;

      useEffect(() => {
        historyRef.current = historyRecords;
        try {
          window.localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(historyRecords));
        } catch (error) {
          // 忽略 localStorage 异常，避免影响主要计算流程。
        }
      }, [historyRecords]);

      useEffect(() => {
        try {
          window.localStorage.setItem(STORAGE_KEYS.autoSave, String(autoSaveEnabled));
        } catch (error) {
          // 忽略 localStorage 异常，避免影响主要计算流程。
        }
      }, [autoSaveEnabled]);

      useEffect(() => {
        try {
          window.localStorage.setItem(STORAGE_KEYS.timeZone, selectedTimeZone);
        } catch (error) {
          // 忽略 localStorage 异常，避免影响主要计算流程。
        }
      }, [selectedTimeZone]);

      useEffect(() => {
        try {
          window.localStorage.setItem(STORAGE_KEYS.showChartValues, String(showChartValues));
        } catch (error) {
          // 忽略 localStorage 异常，避免影响主要计算流程。
        }
      }, [showChartValues]);

      useEffect(() => {
        try {
          window.localStorage.setItem(STORAGE_KEYS.showSpxTrend, String(showSpxTrend));
        } catch (error) {
          // 忽略 localStorage 异常，避免影响主要计算流程。
        }
      }, [showSpxTrend]);

      useEffect(() => {
        if (!feedback) return undefined;

        const timeoutId = window.setTimeout(() => setFeedback(null), 2600);
        return () => window.clearTimeout(timeoutId);
      }, [feedback]);

      useEffect(() => {
        if (!chartFullscreenOpen) return undefined;

        const handleKeyDown = (event) => {
          if (event.key === 'Escape') {
            setChartFullscreenOpen(false);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [chartFullscreenOpen]);

      useEffect(() => {
        setSelectedRecordIds((current) => current.filter((id) => historyRecords.some((record) => record.id === id)));
      }, [historyRecords]);

      useEffect(() => {
        if (!autoSaveEnabled || !hasValidInput) return undefined;

        const record = createCurrentRecord();
        const signature = getRecordSignature(record);
        const latestRecord = historyRef.current[0];
        const latestSignature = latestRecord ? getRecordSignature(latestRecord) : '';

        if (signature === latestSignature || signature === lastAutoSavedSignatureRef.current) {
          lastAutoSavedSignatureRef.current = signature;
          return undefined;
        }

        setHistoryRecords([record, ...historyRef.current]);
        lastAutoSavedSignatureRef.current = signature;
        setFeedback({ tone: 'success', text: '已自动保存最新记录。' });
        return undefined;
      }, [autoSaveEnabled, inputMode, upCount, downCount, flatCount, manualTemperature, spxValue, manualRecordTime, hasValidInput, temperature]);

      const getTemperatureColor = (temp) => {
        if (temp > 60) return 'bg-red-600';
        if (temp < 20) return 'bg-green-600';
        return 'bg-slate-950';
      };

      const getTemperatureText = (temp) => {
        if (!hasAnyInput) return '请输入数据';
        if (temp > 60) return '市场偏热（多头强势）';
        if (temp < 20) return '市场偏冷（空头强势）';
        return '市场中性（20°-60°）';
      };

      const createCurrentRecord = () => {
        const timestamp = isManualInputMode ? manualRecordTimestamp : Date.now();
        const roundedTemperature = Number(temperature.toFixed(2));
        const recordMode = isManualInputMode ? INPUT_MODES.manual : INPUT_MODES.counts;
        return {
          id: `${timestamp}-${Math.random().toString(16).slice(2, 8)}`,
          timestamp,
          inputMode: recordMode,
          dateLabel: formatRecordDate(timestamp, selectedTimeZone),
          upCount: recordMode === INPUT_MODES.counts ? upValue : 0,
          downCount: recordMode === INPUT_MODES.counts ? downValue : 0,
          flatCount: recordMode === INPUT_MODES.counts ? flatValue : 0,
          totalCount: recordMode === INPUT_MODES.counts ? totalCount : 0,
          temperature: roundedTemperature,
          spxValue: spxValue === '' ? null : Number(spxInputValue.toFixed(2)),
        };
      };

      const saveCurrentRecord = (source) => {
        if (!hasValidInput) {
          setFeedback({ tone: 'error', text: !hasValidSpxInput ? 'SPX 点位需为空或大于 0。' : (isManualInputMode ? '请输入有效日期，以及 0 到 100 之间的温度。' : '请先输入有效数据，再保存记录。') });
          return;
        }

        const latestRecord = historyRef.current[0];
        const record = createCurrentRecord();
        const signature = getRecordSignature(record);
        const latestSignature = latestRecord ? getRecordSignature(latestRecord) : '';

        if (signature === latestSignature) {
          lastAutoSavedSignatureRef.current = signature;
          setFeedback({ tone: 'info', text: '当前数据和最新一条相同，已跳过重复保存。' });
          return;
        }

        setHistoryRecords([record, ...historyRef.current]);
        if (source === 'manual') {
          setSpxValue('');
        }
        lastAutoSavedSignatureRef.current = signature;
        setFeedback({
          tone: 'success',
          text: source === 'manual' ? '已保存本次记录。' : '已自动保存最新记录。',
        });
      };

      const refreshSpxForCurrentRange = async () => {
        if (!statsRecords.length) {
          setFeedback({ tone: 'info', text: '当前区间没有历史记录可刷新 SPX。' });
          return;
        }
        const missingSpxRecords = statsRecords.filter((record) => !hasSpxValue(record));
        if (!missingSpxRecords.length) {
          setFeedback({ tone: 'info', text: '当前区间的历史记录都已有 SPX 数据，未消耗 API call。' });
          return;
        }

        setSpxRangeFetchLoading(true);
        const updates = {};
        let successCount = 0;
        let failureCount = 0;
        let firstErrorMessage = '';

        try {
          const marketDates = missingSpxRecords.map((record) =>
            formatRecordDateFilterValue(record.timestamp, SPX_MARKET_TIME_ZONE)
          );
          const startDate = shiftDateInputValue(marketDates.reduce((earliest, date) => date < earliest ? date : earliest), -7);
          const endDate = shiftDateInputValue(marketDates.reduce((latest, date) => date > latest ? date : latest), 2);
          const rows = await fetchSpxRowsForDateRange(startDate, endDate, spxApiKey);

          missingSpxRecords.forEach((record) => {
            const marketDate = formatRecordDateFilterValue(record.timestamp, SPX_MARKET_TIME_ZONE);
            const result = pickSpxCloseForMarketDate(rows, marketDate);
            updates[record.id] = result.value;
            successCount += 1;
          });
        } catch (error) {
          failureCount = missingSpxRecords.length;
          firstErrorMessage = error.message || 'SPX 联网刷新失败。';
        }

        if (successCount) {
          setHistoryRecords((current) =>
            current
              .map((record) =>
                Object.prototype.hasOwnProperty.call(updates, record.id)
                  ? { ...record, spxValue: updates[record.id] }
                  : record
              )
              .sort((a, b) => b.timestamp - a.timestamp)
          );
        }

        setSpxRangeFetchLoading(false);
        if (failureCount && successCount) {
          setFeedback({ tone: 'info', text: `已刷新 ${successCount} 条 SPX，${failureCount} 条失败：${firstErrorMessage}` });
        } else if (successCount) {
          setFeedback({ tone: 'success', text: `已用 1 次 API call 补齐当前区间 ${successCount} 条历史记录的 SPX。` });
        } else {
          setFeedback({ tone: 'error', text: firstErrorMessage || 'SPX 联网刷新失败，请稍后重试。' });
        }
      };

      const handleFocus = (event) => event.target.select();

      const beginEditRecord = (record) => {

          upCount: String(record.upCount),
          downCount: String(record.downCount),
          flatCount: String(record.flatCount),

          spxValue: hasSpxValue(record) ? String(record.spxValue) : '',
        });

      const cancelEditRecord = () => {
        setEditingRecordId(null);
        setEditForm({
          timestamp: '',
          inputMode: INPUT_MODES.counts,
          upCount: '',
          downCount: '',
          flatCount: '',
          manualTemperature: '',
          spxValue: '',

      const toggleSelectAllRecords = () => {

      const beginBulkEdit = () => {

          return;

        const forms = {};
        historyRecords.forEach((record) => {

            inputMode: record.inputMode || INPUT_MODES.counts,
            upCount: String(record.upCount),
            downCount: String(record.downCount),
            flatCount: String(record.flatCount),
            manualTemperature: String(record.temperature),
            spxValue: hasSpxValue(record) ? String(record.spxValue) : '',

        setBulkEditForms(forms);
        setBulkEditingEnabled(true);

      const saveEditedRecord = (recordId) => {
        const parsedTimestamp = parseDateTimeInTimeZone(editForm.timestamp, selectedTimeZone);
        const nextInputMode = editForm.inputMode === INPUT_MODES.manual ? INPUT_MODES.manual : INPUT_MODES.counts;
        const nextUpCount = safeNumber(editForm.upCount);
        const nextDownCount = safeNumber(editForm.downCount);
        const nextFlatCount = safeNumber(editForm.flatCount);
        const nextTotalCount = nextUpCount + nextDownCount + nextFlatCount;
        const nextManualTemperature = safeNumber(editForm.manualTemperature);
        const nextSpxValue = safeNumber(editForm.spxValue);

        if (!Number.isFinite(parsedTimestamp)) {
          setFeedback({ tone: 'error', text: '请填写有效的记录时间。' });
          return;
        }

        if (nextInputMode === INPUT_MODES.counts && nextTotalCount <= 0) {
          setFeedback({ tone: 'error', text: '请填写有效的涨跌平家数。' });
          return;
        }

        if (nextInputMode === INPUT_MODES.manual && (editForm.manualTemperature === '' || nextManualTemperature < 0 || nextManualTemperature > 100)) {
          setFeedback({ tone: 'error', text: '请填写 0 到 100 之间的有效温度。' });
          return;

        if (editForm.spxValue !== '' && nextSpxValue <= 0) {
          setFeedback({ tone: 'error', text: 'SPX 点位需为空或大于 0。' });
          return;
        }

        const nextTemperature = nextInputMode === INPUT_MODES.manual
          ? Number(nextManualTemperature.toFixed(2))
          : Number(((nextUpCount / nextTotalCount) * 100).toFixed(2));

        setHistoryRecords((current) =>
          current
            .map((record) =>
              record.id === recordId
                ? {
                    ...record,
                    timestamp: parsedTimestamp,
                    inputMode: nextInputMode,
                    dateLabel: formatRecordDate(parsedTimestamp, selectedTimeZone),
                    upCount: nextInputMode === INPUT_MODES.counts ? nextUpCount : 0,
                    downCount: nextInputMode === INPUT_MODES.counts ? nextDownCount : 0,
                    flatCount: nextInputMode === INPUT_MODES.counts ? nextFlatCount : 0,
                    totalCount: nextInputMode === INPUT_MODES.counts ? nextTotalCount : 0,
                    temperature: nextTemperature,
                    spxValue: editForm.spxValue === '' ? null : Number(nextSpxValue.toFixed(2)),

          if (!Number.isFinite(parsedTimestamp)) {
            setFeedback({ tone: 'error', text: '批量编辑中有无效时间，请检查后再保存。' });
            return;

          if (nextInputMode === INPUT_MODES.counts && nextTotalCount <= 0) {

            return;

          if (nextInputMode === INPUT_MODES.manual && (form.manualTemperature === '' || nextManualTemperature < 0 || nextManualTemperature > 100)) {
            setFeedback({ tone: 'error', text: '批量编辑中有无效温度，请填写 0 到 100。' });
            return;

          if (form.spxValue !== '' && nextSpxValue <= 0) {

            return;

            upCount: nextInputMode === INPUT_MODES.counts ? nextUpCount : 0,
            downCount: nextInputMode === INPUT_MODES.counts ? nextDownCount : 0,
            flatCount: nextInputMode === INPUT_MODES.counts ? nextFlatCount : 0,
            totalCount: nextInputMode === INPUT_MODES.counts ? nextTotalCount : 0,
            temperature: nextInputMode === INPUT_MODES.manual

              : Number(((nextUpCount / nextTotalCount) * 100).toFixed(2)),
            spxValue: form.spxValue === '' ? null : Number(nextSpxValue.toFixed(2)),

        setHistoryRecords((current) =>
          current
            .map((record) => (updates[record.id] ? { ...record, ...updates[record.id] } : record))

              isManualRecord(record) ? '' : record.totalCount,
              record.temperature.toFixed(2),
              hasSpxValue(record) ? record.spxValue.toFixed(2) : '',
            ]),
        ];

        const csvContent = `\uFEFF${rows.map((row) => row.map(escapeCsvValue).join(',')).join('\r\n')}`;
        const dateStamp = formatFileDate();
        downloadTextFile(csvContent, `market-temperature-history-${dateStamp}.csv`, 'text/csv;charset=utf-8;');
        setDataMenuOpen(false);
        setFeedback({ tone: 'success', text: 'CSV 已导出，可用表格软件继续分析。' });
      };

      const handleExportJson = () => {
        const backup = {
          app: 'market-temperature-calculator',
          schemaVersion: CURRENT_DATA_SCHEMA_VERSION,
          exportedAt: new Date().toISOString(),
          preferences: {
            autoSaveEnabled,
            selectedTimeZone,
            showChartValues,
            showSpxTrend,
          },
          records: normalizeHistoryRecords(historyRef.current),
        };

        const dateStamp = formatFileDate();
        downloadTextFile(
          JSON.stringify(backup, null, 2),
          `market-temperature-backup-${dateStamp}.json`,
          'application/json;charset=utf-8;'
        );
        setDataMenuOpen(false);
        setFeedback({ tone: 'success', text: `JSON 备份已导出，共 ${backup.records.length} 条记录。` });
      };

      const handleImportJsonClick = () => {
        if (jsonImportInputRef.current) {
          jsonImportInputRef.current.value = '';
          jsonImportInputRef.current.click();
        }
      };

      const handleImportJson = (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || ''));
            const rawRecords = Array.isArray(parsed) ? parsed : parsed.records;
            const normalizedRecords = normalizeHistoryRecords(rawRecords);

            if (!normalizedRecords.length) {
              setFeedback({ tone: 'error', text: '没有在 JSON 文件中找到可导入的历史记录。' });
              return;
            }

            if (historyRef.current.length) {
              const shouldReplace = window.confirm(
                `导入会替换当前 ${historyRef.current.length} 条历史记录。确定继续吗？`
              );
              if (!shouldReplace) {
                setFeedback({ tone: 'info', text: '已取消 JSON 导入。' });
                return;
              }
            }

            setHistoryRecords(normalizedRecords);
            lastAutoSavedSignatureRef.current = '';
            cancelEditRecord();
            closeBulkMode();

            if (parsed && parsed.preferences && typeof parsed.preferences === 'object') {
              if (typeof parsed.preferences.autoSaveEnabled === 'boolean') {
                setAutoSaveEnabled(parsed.preferences.autoSaveEnabled);
              }
              if (typeof parsed.preferences.selectedTimeZone === 'string') {
                setSelectedTimeZone(getValidTimeZone(parsed.preferences.selectedTimeZone));
              }
              if (typeof parsed.preferences.showChartValues === 'boolean') {
                setShowChartValues(parsed.preferences.showChartValues);
              }
              if (typeof parsed.preferences.showSpxTrend === 'boolean') {
                setShowSpxTrend(parsed.preferences.showSpxTrend);
              }

            try {
              window.localStorage.setItem(STORAGE_KEYS.schemaVersion, String(CURRENT_DATA_SCHEMA_VERSION));
            } catch (error) {
              // 忽略 localStorage 异常，避免影响导入后的页面状态。
            }

            setFeedback({ tone: 'success', text: `JSON 已导入，共 ${normalizedRecords.length} 条记录。` });
            setDataMenuOpen(false);
          } catch (error) {
            setFeedback({ tone: 'error', text: 'JSON 文件格式无效，导入失败。' });
          }
        };
        reader.onerror = () => {
          setFeedback({ tone: 'error', text: '读取 JSON 文件失败，请重新选择文件。' });
        };
        reader.readAsText(file);
