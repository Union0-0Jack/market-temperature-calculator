                                    </div>
                                  )}
                                </div>
                              );
                            })}
                        </div>
                      </div>
                    ) : null}
                  </div>
                ) : null}

                {historyRecords.length ? (
                  <div className="max-h-[460px] space-y-3 overflow-y-auto pr-1">
                    {visibleHistoryRecords.length ? visibleHistoryRecords.map((record) => (
                      <div
                        key={record.id}
                        className="rounded-2xl border border-slate-200 bg-slate-50 p-4 transition hover:border-slate-300"
                      >
                        <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                          <div className="flex items-start gap-3">
                            {bulkModeEnabled ? (
                              <input
                                type="checkbox"
                                checked={selectedRecordIds.includes(record.id)}
                                onChange={() => toggleRecordSelection(record.id)}
                                className="mt-1 h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-400"
                              />
                            ) : null}
                            <div>
                              <div className="text-sm font-semibold text-slate-800">{formatRecordDate(record.timestamp, selectedTimeZone)}</div>
                              <div className="mt-1 text-xs text-slate-500">
                                {isManualRecord(record)
                                  ? '手动录入温度，用于补齐缺少涨跌家数的历史。'
                                  : `总家数 ${record.totalCount.toFixed(0)}，可对照当时盘面宽度变化。`}
                              </div>
                            </div>
                          </div>

                          <div className="flex items-center gap-2">
                            {!bulkModeEnabled ? (
                              <button
                                type="button"
                                onClick={() => (editingRecordId === record.id ? cancelEditRecord() : beginEditRecord(record))}
                                className={`inline-flex items-center gap-1 rounded-full px-3 py-1 text-sm font-semibold transition ${
                                  editingRecordId === record.id
                                    ? 'bg-slate-200 text-slate-700 hover:bg-slate-300'
                                    : 'bg-blue-50 text-blue-700 hover:bg-blue-100'
                                }`}
                              >
                                {editingRecordId === record.id ? <XIcon size={14} /> : <EditIcon size={14} />}
                                <span>{editingRecordId === record.id ? '取消' : '编辑'}</span>
                              </button>
                            ) : null}
                            <div className="rounded-full bg-white px-3 py-1 text-sm font-bold text-slate-800 shadow-sm">
                              {formatTemperature(record.temperature)}
                            </div>
                            {hasSpxValue(record) ? (
                              <div className="rounded-full bg-violet-50 px-3 py-1 text-sm font-bold text-violet-700 shadow-sm">
                                SPX {formatSpxValue(record.spxValue)}
                              </div>
                            ) : null}
                          </div>
                        </div>

                        {editingRecordId === record.id ? (
                          <div className="mt-4 space-y-4 rounded-2xl border border-blue-200 bg-white p-4">
                            <div className="grid gap-3 md:grid-cols-2">
                              <label className="block">
                                <span className="mb-1 block text-xs font-medium text-slate-500">记录时间</span>
                                <input
                                  type="datetime-local"
                                  value={editForm.timestamp}
                                  onChange={(event) => handleEditFormChange('timestamp', event.target.value)}
                                  className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200"
                                />
                              </label>
                              <label className="block">
                                <span className="mb-1 block text-xs font-medium text-slate-500">记录方式</span>
                                <select
                                  value={editForm.inputMode}
                                  onChange={(event) => handleEditFormChange('inputMode', event.target.value)}
                                  className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200"
                                >
                                  <option value={INPUT_MODES.counts}>涨跌家数</option>
                                  <option value={INPUT_MODES.manual}>手动温度</option>
                                </select>
                              </label>
                            </div>

                            <div className="grid gap-3 sm:grid-cols-2">
                              <label className="block">
                                <span className="mb-1 block text-xs font-medium text-slate-500">SPX 点位</span>
                                <input
                                  type="number"
                                  min="0"
                                  step="0.01"
                                  value={editForm.spxValue}
                                  onChange={(event) => handleEditFormChange('spxValue', event.target.value)}
                                  placeholder="留空表示未记录"
                                  className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-200"
                                />
                              </label>
                            </div>

                            {editForm.inputMode === INPUT_MODES.manual ? (
                              <div className="grid gap-3 sm:grid-cols-2">
                                <label className="block">
                                  <span className="mb-1 block text-xs font-medium text-slate-500">历史温度</span>
                                  <input
                                    type="number"
                                    min="0"
                                    max="100"
                                    step="0.01"
                                    value={editForm.manualTemperature}
                                    onChange={(event) => handleEditFormChange('manualTemperature', event.target.value)}
                                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200"
                                  />
                                </label>
                              </div>
                            ) : (
                              <div className="grid gap-3 sm:grid-cols-3">
                                <label className="block">
                                  <span className="mb-1 block text-xs font-medium text-slate-500">上涨家数</span>
                                  <input
                                    type="number"
                                    min="0"
                                    value={editForm.upCount}
                                    onChange={(event) => handleEditFormChange('upCount', event.target.value)}
                                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 outline-none focus:border-red-400 focus:ring-2 focus:ring-red-200"
                                  />
                                </label>
                                <label className="block">
                                  <span className="mb-1 block text-xs font-medium text-slate-500">下跌家数</span>
                                  <input
                                    type="number"
                                    min="0"
                                    value={editForm.downCount}
                                    onChange={(event) => handleEditFormChange('downCount', event.target.value)}
                                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 outline-none focus:border-green-400 focus:ring-2 focus:ring-green-200"
                                  />
                                </label>
                                <label className="block">
                                  <span className="mb-1 block text-xs font-medium text-slate-500">平盘家数</span>
                                  <input
                                    type="number"
                                    min="0"
                                    value={editForm.flatCount}
                                    onChange={(event) => handleEditFormChange('flatCount', event.target.value)}
                                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200"
                                  />
                                </label>
                              </div>
                            )}

                            <div className="flex flex-wrap gap-3">
                              <button
                                type="button"
                                onClick={() => saveEditedRecord(record.id)}
                                className="inline-flex items-center gap-2 rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700"
                              >
                                <SaveIcon size={16} />
                                <span>保存修改</span>
                              </button>
                              <button
                                type="button"
                                onClick={() => deleteRecord(record.id)}
                                className="inline-flex items-center gap-2 rounded-xl border border-red-200 bg-red-50 px-4 py-2.5 text-sm font-semibold text-red-600 transition hover:bg-red-100"
                              >
                                <TrashIcon size={16} />
                                <span>删除此条</span>
                              </button>
                            </div>
                          </div>
                        ) : (
                          isManualRecord(record) ? (
                            <div className="mt-4 rounded-xl bg-white px-3 py-2">
                              <div className="text-xs font-medium text-slate-500">记录来源</div>
                              <div className="mt-1 text-lg font-bold text-blue-700">手动温度</div>
                            </div>
                          ) : (
                            <div className="mt-4 grid gap-3 sm:grid-cols-3">
                              <div className="rounded-xl bg-white px-3 py-2">
                                <div className="text-xs font-medium text-slate-500">上涨家数</div>
                                <div className="mt-1 text-lg font-bold text-red-600">{record.upCount}</div>
                              </div>
                              <div className="rounded-xl bg-white px-3 py-2">
                                <div className="text-xs font-medium text-slate-500">下跌家数</div>
                                <div className="mt-1 text-lg font-bold text-green-600">{record.downCount}</div>
                              </div>
                              <div className="rounded-xl bg-white px-3 py-2">
                                <div className="text-xs font-medium text-slate-500">平盘家数</div>
                                <div className="mt-1 text-lg font-bold text-slate-700">{record.flatCount}</div>
                              </div>
                            </div>
                          )
                        )}
                      </div>
                    )) : (
                      <div className="rounded-2xl border border-dashed border-slate-200 bg-slate-50 px-4 py-10 text-center text-sm text-slate-500">
                        这个日期没有历史记录。换一天看看，或清空筛选回到全部记录。
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="rounded-2xl border border-dashed border-slate-200 bg-slate-50 px-4 py-12 text-center text-sm text-slate-500">
                    历史列表目前是空的。输入数字后点击“保存本次记录”，或打开自动保存，就会开始累积你的温度数据。
                  </div>
                )}
              </div>
            </div>
          </div>

          {chartFullscreenOpen ? (
            <div className="fixed inset-0 z-50 bg-slate-950/80 p-4 backdrop-blur-sm">
              <div className="mx-auto flex h-full max-w-7xl items-center">
                <HistoryChart
                  records={statsRecords}
                  rangeLabel={activeRangeOption.label}
                  timeZone={selectedTimeZone}
                  showValues={showChartValues}
                  showSpxTrend={showSpxTrend}
                  isFullscreen={true}
                  onClose={() => setChartFullscreenOpen(false)}
                  rangeOptions={RANGE_OPTIONS}
                  activeRangeKey={statsRange}
                  onRangeChange={setStatsRange}
                />
              </div>
            </div>
          ) : null}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
